<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Produtividade Controladoria</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        .header {
            background: white;
            padding: 15px 25px;
            border-radius: 14px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        .titulo-container {
            justify-self: start;
            border-left: 6px solid #004b87;
            padding-left: 18px;
        }

        .titulo-container h2 {
            margin: 0;
            color: #1e293b;
            font-size: 23px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.15;
        }

        .titulo-container span {
            font-weight: 600;
            color: #64748b;
            font-size: 16px;
        }

        .logo-container {
            justify-self: center;
        }

        .logo-wm {
            height: 70px;
            width: auto;
        }

        .controles-header {
            justify-self: end;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="file"] {
            padding: 8px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
        }

        .btn-export {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filters select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background-color: white;
            flex-grow: 1;
            font-weight: 700;
            color: #334155;
        }

        .kpis {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            margin-bottom: 22px;
        }

        .kpi {
            background: white;
            padding: 18px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border-bottom: 5px solid #0ea5e9;
            min-height: 95px;
        }

        .kpi h1 {
            margin: 0;
            font-size: 31px;
            font-weight: 900;
            color: #0ea5e9;
            word-break: break-word;
        }

        .kpi p {
            margin: 8px 0 0 0;
            color: #64748b;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
        }

        .card {
            background: white;
            padding: 22px;
            border-radius: 14px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            page-break-inside: avoid;
            position: relative;
            overflow: hidden;
        }

        .card h3 {
            margin: 0 0 18px 0;
            color: #1e293b;
            text-align: center;
            font-size: 16px;
            font-weight: 900;
        }

        .chart-container {
            position: relative;
            height: 360px;
            width: 100%;
        }

        .chart-container.horizontal {
            height: 430px;
        }

        .chart-container.status {
            height: 260px;
        }

        #gaugeText {
            position: absolute;
            top: 61%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        #gaugeText .perc-conc {
            display: block;
            font-size: 39px;
            font-weight: 900;
            color: #10b981;
        }

        #gaugeText .label-conc {
            display: block;
            font-size: 13px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        #gaugeText .perc-pend {
            display: block;
            font-size: 15px;
            font-weight: 900;
            color: #ef4444;
        }

        @media print {
            body {
                background: white !important;
                padding: 10px;
            }

            .filters,
            #uploadCsv,
            .btn-export {
                display: none !important;
            }

            .header {
                box-shadow: none;
                border: 1px solid #e5e7eb;
            }

            .kpis {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
            }

            .charts {
                grid-template-columns: 1fr 1fr !important;
                gap: 14px;
            }

            .card {
                box-shadow: none;
                border: 1px solid #e5e7eb;
                padding: 16px;
            }

            .chart-container {
                height: 320px;
            }

            .chart-container.horizontal {
                height: 370px;
            }

            .chart-container.status {
                height: 240px;
            }
        }

        @media (max-width: 900px) {
            .header {
                grid-template-columns: 1fr;
                gap: 15px;
                text-align: center;
            }

            .titulo-container,
            .logo-container,
            .controles-header {
                justify-self: center;
            }

            .kpis,
            .charts {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="titulo-container">
            <h2>
                Produtividade<br>
                <span>Controladoria</span>
            </h2>
        </div>

        <div class="logo-container">
            <img src="LOGOTIPO1.jpg" alt="Logo WM" class="logo-wm">
        </div>

        <div class="controles-header">
            <input type="file" id="uploadCsv" accept=".csv">
            <button id="btnPdf" class="btn-export" onclick="window.print()">⬇ Exportar PDF</button>
        </div>
    </div>

    <div class="filters">
        <select id="filtroObra">
            <option value="TODOS">Todas as Obras</option>
        </select>

        <select id="filtroGestor">
            <option value="TODOS">Todos os Gestores</option>
        </select>

        <select id="filtroAuditor">
            <option value="TODOS">Todos os Auditores</option>
        </select>
    </div>

    <div id="areaDashboard">
        <div class="kpis">
            <div class="kpi">
                <h1 id="kpiTotal">0</h1>
                <p>Total Registros</p>
            </div>

            <div class="kpi">
                <h1 id="kpiPrazo">0</h1>
                <p>Prazo Médio (Dias)</p>
            </div>

            <div class="kpi">
                <h1 id="kpiConclusao">0%</h1>
                <p>Concluídos</p>
            </div>

            <div class="kpi">
                <h1 id="kpiObra">-</h1>
                <p>Obra em Destaque</p>
            </div>
        </div>

        <div class="charts">
            <div class="card">
                <h3>Status de Conclusão</h3>
                <div class="chart-container status">
                    <canvas id="chartStatus"></canvas>
                    <div id="gaugeText">
                        <span class="perc-conc" id="txtPercConc">0%</span>
                        <label class="label-conc">Concluído</label>
                        <span class="perc-pend" id="txtPercPend">0% Pendente</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Registros por Obra</h3>
                <div class="chart-container horizontal">
                    <canvas id="chartObra"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Registros por Gestor</h3>
                <div class="chart-container horizontal">
                    <canvas id="chartGestor"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Produtividade por Auditor</h3>
                <div class="chart-container horizontal">
                    <canvas id="chartAuditor"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Distribuição por Assunto</h3>
                <div class="chart-container horizontal">
                    <canvas id="chartAssunto"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Prazo Médio por Auditor (Dias)</h3>
                <div class="chart-container horizontal">
                    <canvas id="chartPrazoAuditor"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        let dadosGlobais = [];
        const chartInstances = {};

        const coresPadrao = [
            '#0ea5e9',
            '#10b981',
            '#f59e0b',
            '#ef4444',
            '#8b5cf6',
            '#ec4899',
            '#14b8a6',
            '#f97316',
            '#6366f1',
            '#84cc16',
            '#06b6d4',
            '#f43f5e'
        ];

        const correcoes = {
            "REFEICOES": "REFEIÇÕES",
            "REFEICAO": "REFEIÇÃO",
            "AGUA E GELO": "ÁGUA E GELO",
            "LAVAGEM VEICULOS": "LAVAGEM VEÍCULOS",
            "COMBUSTIVEL": "COMBUSTÍVEL",
            "MANUTENCAO": "MANUTENÇÃO",
            "CEARA MIRIM": "CEARÁ MIRIM",
            "CEARA-MIRIM": "CEARÁ-MIRIM",
            "FLAVIO": "FLÁVIO",
            "JOAO VICTOR": "JOÃO VICTOR",
            "RIBEIRAO": "RIBEIRÃO",
            "PRATUDAO": "PRATUDÃO",
            "CAIXINHA": "CAIXINHA",
            "LIDYANE": "LIDYANE",
            "ANDERSON": "ANDERSON"
        };

        function normalizar(texto) {
            if (!texto) return "";

            let t = texto
                .toString()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .trim()
                .toUpperCase();

            return correcoes[t] || t;
        }

        function isValorValido(valor) {
            return valor &&
                   valor !== "TOTAL" &&
                   valor !== "NÃO INFORMADO" &&
                   valor !== "NÃO INFORMADA" &&
                   valor.length > 1 &&
                   isNaN(valor);
        }

        function ordenar(obj) {
            return Object.entries(obj).sort((a, b) => b[1] - a[1]);
        }

        function processar(dados) {
            let total = 0;
            let somaP = 0;
            let qtdP = 0;
            let conc = 0;
            let pend = 0;

            const obras = {};
            const gestores = {};
            const auditores = {};
            const assuntos = {};
            const audP = {};
            const audPQtd = {};

            dados.forEach(l => {
                const o = normalizar(l["OBRA"]) || "NÃO INFORMADA";
                const g = normalizar(l["GESTOR"]) || "NÃO INFORMADO";
                const a = normalizar(l["AUDITOR"]) || "NÃO INFORMADO";
                const ass = normalizar(l["ASSUNTO"]) || "OUTROS";

                const textoLinha = normalizar(Object.values(l).join(" "));
                const isConcluido = textoLinha.includes("CONCLUIDO") || textoLinha.includes("SALDO");

                total++;

                let p = parseFloat(
                    (l["PRAZO"] || l["PRAZOS"] || "0")
                    .toString()
                    .replace(",", ".")
                );

                if (!isNaN(p)) {
                    somaP += p;
                    qtdP++;

                    if (isValorValido(a)) {
                        audP[a] = (audP[a] || 0) + p;
                        audPQtd[a] = (audPQtd[a] || 0) + 1;
                    }
                }

                if (isConcluido) {
                    conc++;
                } else {
                    pend++;
                }

                if (isValorValido(o)) {
                    obras[o] = (obras[o] || 0) + 1;
                }

                if (isValorValido(g)) {
                    gestores[g] = (gestores[g] || 0) + 1;
                }

                if (isValorValido(a)) {
                    auditores[a] = (auditores[a] || 0) + 1;
                }

                if (
                    isValorValido(ass) &&
                    ass !== "ANDERSON" &&
                    ass !== "FLÁVIO" &&
                    ass !== "LIDYANE"
                ) {
                    assuntos[ass] = (assuntos[ass] || 0) + 1;
                }
            });

            const pConc = total > 0 ? ((conc / total) * 100).toFixed(2) : "0.00";
            const pPend = total > 0 ? ((pend / total) * 100).toFixed(2) : "0.00";

            document.getElementById("kpiTotal").innerText = total;
            document.getElementById("kpiPrazo").innerText = qtdP > 0 ? (somaP / qtdP).toFixed(2) : "0.00";
            document.getElementById("kpiConclusao").innerText = pConc + "%";
            document.getElementById("txtPercConc").innerText = pConc + "%";
            document.getElementById("txtPercPend").innerText = pPend + "% PENDENTE";

            let topO = "-";
            let maxO = 0;

            for (let o in obras) {
                if (obras[o] > maxO) {
                    maxO = obras[o];
                    topO = o;
                }
            }

            document.getElementById("kpiObra").innerText = topO;

            const audPMed = {};

            for (let a in audP) {
                audPMed[a] = Number((audP[a] / audPQtd[a]).toFixed(2));
            }

            gerarGauge("chartStatus", conc, pend);

            gerarGraficoHorizontal(
                "chartObra",
                ordenar(obras).map(i => i[0]),
                ordenar(obras).map(i => i[1]),
                true
            );

            gerarGraficoHorizontal(
                "chartGestor",
                ordenar(gestores).map(i => i[0]),
                ordenar(gestores).map(i => i[1]),
                true
            );

            gerarGraficoHorizontal(
                "chartAuditor",
                ordenar(auditores).map(i => i[0]),
                ordenar(auditores).map(i => i[1]),
                true
            );

            gerarGraficoHorizontal(
                "chartAssunto",
                ordenar(assuntos).map(i => i[0]),
                ordenar(assuntos).map(i => i[1]),
                true
            );

            gerarGraficoHorizontal(
                "chartPrazoAuditor",
                ordenar(audPMed).map(i => i[0]),
                ordenar(audPMed).map(i => i[1]),
                false,
                " dias"
            );
        }

        function gerarGauge(id, conc, pend) {
            if (chartInstances[id]) chartInstances[id].destroy();

            chartInstances[id] = new Chart(document.getElementById(id), {
                type: 'doughnut',
                data: {
                    labels: ['Concluído', 'Pendente'],
                    datasets: [{
                        data: [conc, pend],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderWidth: 0,
                        circumference: 180,
                        rotation: 270,
                        cutout: '86%'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: {
                            top: 10,
                            bottom: 10,
                            left: 10,
                            right: 10
                        }
                    },
                    plugins: {
                        datalabels: {
                            display: false
                        },
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const valor = context.raw;
                                    const perc = total > 0 ? ((valor / total) * 100).toFixed(2) : "0.00";
                                    return context.label + ": " + valor + " (" + perc + "%)";
                                }
                            }
                        }
                    }
                }
            });
        }

        function gerarGraficoHorizontal(id, labels, data, mostrarPorcentagem = true, sufixo = "") {
            if (chartInstances[id]) chartInstances[id].destroy();

            const total = data.reduce((a, b) => Number(a) + Number(b), 0);

            chartInstances[id] = new Chart(document.getElementById(id), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: labels.map((_, i) => coresPadrao[i % coresPadrao.length]),
                        borderRadius: 8,
                        barThickness: 24,
                        maxBarThickness: 30,
                        borderWidth: 1,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: {
                            left: 6,
                            right: 95,
                            top: 8,
                            bottom: 8
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const valor = Number(context.raw);
                                    if (mostrarPorcentagem) {
                                        const perc = total > 0 ? ((valor / total) * 100).toFixed(2) : "0.00";
                                        return valor + " registros (" + perc + "%)";
                                    }
                                    return valor.toFixed(2) + sufixo;
                                }
                            }
                        },
                        datalabels: {
                            color: '#1e293b',
                            anchor: 'end',
                            align: 'right',
                            offset: 8,
                            clamp: true,
                            clip: false,
                            font: {
                                weight: '900',
                                size: 10
                            },
                            formatter: function(value) {
                                const valor = Number(value);

                                if (mostrarPorcentagem) {
                                    const perc = total > 0 ? ((valor / total) * 100).toFixed(2) : "0.00";
                                    return valor + " | " + perc + "%";
                                }

                                return valor.toFixed(2) + sufixo;
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            suggestedMax: Math.max(...data.map(Number)) * 1.25,
                            grid: {
                                color: '#e5e7eb'
                            },
                            ticks: {
                                font: {
                                    weight: '700',
                                    size: 11
                                }
                            }
                        },
                        y: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: '#334155',
                                font: {
                                    weight: '900',
                                    size: 11
                                },
                                callback: function(value) {
                                    const label = this.getLabelForValue(value);
                                    return label.length > 22 ? label.substring(0, 22) + "..." : label;
                                }
                            }
                        }
                    }
                }
            });
        }

        document.getElementById("uploadCsv").addEventListener("change", function(e) {
            const file = e.target.files[0];

            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                encoding: "ISO-8859-1",

                transformHeader: h => {
                    let header = h.toString().trim().toUpperCase();

                    if (header.includes("PRAZO")) return "PRAZO";

                    return normalizar(h);
                },

                complete: res => {
                    dadosGlobais = res.data.filter(l => {
                        const dataEntrada = l["DATA ENTRADA"] || l["DATA ENTRADA\n"];
                        return dataEntrada && dataEntrada.toString().trim().length > 2;
                    });

                    popularFiltros();
                    processar(dadosGlobais);

                    document.getElementById("btnPdf").style.display = "block";
                }
            });
        });

        function popularFiltros() {
            const carregar = (id, campo) => {
                const s = document.getElementById(id);

                const itens = [
                    ...new Set(
                        dadosGlobais.map(l => normalizar(l[campo]) || "NÃO INFORMADO")
                    )
                ]
                .filter(i => isValorValido(i))
                .sort();

                s.innerHTML = s.options[0].outerHTML;

                itens.forEach(v => {
                    const o = document.createElement("option");
                    o.value = v;
                    o.text = v;
                    s.appendChild(o);
                });
            };

            carregar("filtroObra", "OBRA");
            carregar("filtroGestor", "GESTOR");
            carregar("filtroAuditor", "AUDITOR");
        }

        const filtrar = () => {
            const obra = document.getElementById("filtroObra").value;
            const gestor = document.getElementById("filtroGestor").value;
            const auditor = document.getElementById("filtroAuditor").value;

            const dadosFiltrados = dadosGlobais.filter(l => {
                const obraLinha = normalizar(l["OBRA"]);
                const gestorLinha = normalizar(l["GESTOR"]);
                const auditorLinha = normalizar(l["AUDITOR"]);

                return (
                    (obra === "TODOS" || obraLinha === obra) &&
                    (gestor === "TODOS" || gestorLinha === gestor) &&
                    (auditor === "TODOS" || auditorLinha === auditor)
                );
            });

            processar(dadosFiltrados);
        };

        document.getElementById("filtroObra").onchange = filtrar;
        document.getElementById("filtroGestor").onchange = filtrar;
        document.getElementById("filtroAuditor").onchange = filtrar;
    </script>

</body>
</html>
